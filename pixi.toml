[workspace]
name = "foldit-foundry-plugin"
version = "0.1.0"
channels = ["conda-forge"]
platforms = ["linux-64", "osx-arm64", "win-64"]

[dependencies]
python = "3.12.*"
pytest = "*"

# Force Python into UTF-8 mode. pixi activates the environment before
# building PyPI source dists, so this reaches the setuptools build
# subprocess. Without it, Windows' default cp1252 codec makes `open()`
# in a dependency's setup.py choke on UTF-8 bytes. No-op on macOS/Linux.
[activation.env]
PYTHONUTF8 = "1"

[pypi-dependencies]
# This plugin. Its Python module is `foundry_plugin`; the distribution
# name is `foundry-plugin` so it does not shadow the `foundry` package
# that rc-foundry (deps/foundry) provides.
foundry-plugin = { path = ".", editable = true }
# rc-foundry provides the rf3 / rfd3 / mpnn sub-engines.
rc-foundry = { path = "deps/foundry", editable = true }
# Published contract SDK + structure conversions.
foldit-plugin-sdk = ">=0.1.4"
molex = "==0.7.2"
